logging:
  level:
    root: INFO
    com.shop: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

server:
  port: 8083

spring:
  application:
    name: points-service
  profiles:
    active: dev
  kafka:
    bootstrap-servers: 192.168.40.198:9092
    consumer:
      group-id: points-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  datasource:
    url: jdbc:h2:mem:pointsdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  zipkin:
    tracing:
      endpoint: http://192.168.40.198:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: b3
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}