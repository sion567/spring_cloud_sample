spring:
  application:
    name: monitor-service
  profiles:
    active: dev
  boot:
    admin:
      discovery:
        enabled: true
        services: '*'
  zipkin:
    base-url: http://192.168.40.198:9411
  sleuth:
    sampler:
      probability: 1.0

server:
  port: 7788

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.shop: DEBUG
