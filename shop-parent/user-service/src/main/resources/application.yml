server:
  port: -1

spring:
  application:
    name: user-service
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.40.198:8848
        fail-fast: false
        timeout: 5000
        watch-delay: 30000
        namespace: public
        management-port: ${server.port}
        metadata:
          management.port: ${server.port}
  zipkin:
    base-url: http://192.168.40.198:9411
  sleuth:
    sampler:
      probability: 1.0

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: tri
    port: ${DUBBO_PORT:50051}
  registry:
    address: nacos://192.168.40.198:8848
    parameters:
      namespace: public
  metrics:
    protocol: prometheus
    enable-jvm: true
    enable-registry: true
    aggregation:
      enabled: true
    prometheus:
      exporter:
        enabled: true
    enable-metadata: true

logging:
  level:
    root: INFO
    com.shop: DEBUG
