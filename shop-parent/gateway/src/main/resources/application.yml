spring:
  profiles:
    active: dev
  application:
    name: gateway-service           # 服务名
  cloud:
    config:
      server-addr: 192.168.40.198:8848
      namespace: 9fa6ef4b-0e59-475a-9626-8399ded16a41
      username: 'nacos'
      password: 'nacos'
      file-extension: yaml
      group: DEFAULT_GROUP
    discovery:
      server-addr: 192.168.40.198:8848
      namespace: 9fa6ef4b-0e59-475a-9626-8399ded16a41
      username: 'nacos'
      password: 'nacos'
      group: DEFAULT_GROUP

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  zipkin:
    tracing:
      endpoint: http://192.168.40.198:9411/api/v2/spans
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: b3
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-signing-must-be-long-enough}

logging:
  level:
    root: INFO
    com.shop: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
