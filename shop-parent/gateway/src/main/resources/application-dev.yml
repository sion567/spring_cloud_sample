spring:
  cloud:
    consul:
      host: 192.168.40.198
      port: 8500
      discovery:
        enabled: true
        register: true
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        health-check-interval: 10s
        instance-id: ${spring.application.name}:${server.port}:${random.value}
        prefer-ip-address: true
    gateway:
      httpclient:
        pool:
          max-connections: 1000
          acquire-timeout: 2000
      metrics:
        enabled: true
      server:
        webflux:
          routes:
            - id: user_route
              uri: http://localhost:8081
              predicates:
                - Path=/api/user/**
            - id: product_route
              uri: http://localhost:8082
              predicates:
                - Path=/api/product/**
            - id: order_route
              uri: http://localhost:8083
              predicates:
                - Path=/api/order/**

logging:
  level:
    root: INFO
    com.shop.gateway: DEBUG
