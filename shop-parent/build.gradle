plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

allprojects {
    group = 'com.shop'
    version = '1.0.0'
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    repositories {
        mavenCentral()
    }

    dependencyManagement {
        imports {
            mavenBom 'org.springframework.boot:spring-boot-dependencies:4.0.6'
            mavenBom 'org.springframework.cloud:spring-cloud-dependencies:2025.1.1'
        }
        dependencies {
            dependency 'de.codecentric:spring-boot-admin-starter-server:4.0.4'
            dependency 'org.springframework.cloud:spring-cloud-starter-gateway-server-webflux:5.0.1'
            // dependency 'org.springframework.cloud:spring-cloud-starter-gateway-server-webmvc'
        }
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }
}
