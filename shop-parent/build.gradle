plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

allprojects {
    group = 'com.shop'
    version = '1.0.0'
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    repositories {
        mavenCentral()
    }
// https://spring.io/blog/2026/01/29/spring-cloud-2025-1-1-aka-oakwood-has-been-released
    dependencyManagement {
        imports {
            mavenBom 'org.springframework.boot:spring-boot-dependencies:3.5.0'
            mavenBom 'org.springframework.cloud:spring-cloud-dependencies:2025.0.0'
            mavenBom 'com.alibaba.cloud:spring-cloud-alibaba-dependencies:2025.0.0.0'
        }
        dependencies {
            dependency 'de.codecentric:spring-boot-admin-starter-server:3.5.0'
            dependency 'de.codecentric:spring-boot-admin-starter-client:3.5.0'

            dependency 'org.apache.dubbo:dubbo-spring-boot-starter:3.3.6'
            dependency 'org.apache.dubbo:dubbo-nacos-spring-boot-starter:3.3.6'
            dependency 'com.alibaba.cloud:spring-cloud-starter-alibaba-nacos-discovery:2025.0.0.0'

            dependency 'com.google.protobuf:protobuf-java:4.34.1'
            dependency 'com.google.protobuf:protobuf-java-util:4.34.1'

            dependency 'org.mapstruct:mapstruct:1.6.3'
            dependency 'org.projectlombok:lombok-mapstruct-binding:0.2.0'
        }
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    test {
        useJUnitPlatform()
    }
}
