global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-cloud-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'localhost:8080'   # gateway
          - 'localhost:8081'   # user-service
          - 'localhost:8082'   # product-service
          - 'localhost:8083'   # order-service
          - 'localhost:8084'   # monitor-service
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: 'localhost:(\d+)'
        replacement: '${1}'
